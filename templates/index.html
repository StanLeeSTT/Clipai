<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ClipAI — Smart Video Clipper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c4dff;
    --accent2: #00e5ff;
    --accent3: #ff4d6d;
    --text: #e8e8f4;
    --text2: #8888aa;
    --success: #00e676;
    --warn: #ffab40;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(124,77,255,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,77,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,77,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
    animation: orb-float 8s ease-in-out infinite;
  }
  .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; right: -100px; }
  .orb-2 { width: 300px; height: 300px; background: var(--accent2); bottom: -50px; left: -50px; animation-delay: -3s; }
  .orb-3 { width: 200px; height: 200px; background: var(--accent3); top: 50%; left: 50%; animation-delay: -5s; }

  @keyframes orb-float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  .header {
    text-align: center;
    padding: 48px 0 40px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 0 24px rgba(124,77,255,0.4);
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }

  .tagline {
    color: var(--text2);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.3px;
  }

  .tagline span { color: var(--accent2); font-weight: 600; }

  .mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text2);
    margin-top: 12px;
  }
  .mode-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text2);
    animation: pulse 2s infinite;
  }
  .mode-dot.full { background: var(--success); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(124,77,255,0.3); }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-title .icon { font-size: 20px; }

  .tabs {
    display: flex;
    background: var(--bg3);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .tab.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 16px rgba(124,77,255,0.4);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .url-input-wrap {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .input {
    flex: 1;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }
  .input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,77,255,0.15);
    background: var(--bg);
  }
  .input::placeholder { color: var(--text2); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 24px;
    border: none;
    border-radius: 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9c6dff);
    color: white;
    box-shadow: 0 4px 20px rgba(124,77,255,0.35);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(124,77,255,0.5);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .btn-secondary {
    background: var(--bg3);
    border: 1.5px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--accent); background: rgba(124,77,255,0.1); }
  .btn-danger {
    background: rgba(255,77,109,0.15);
    border: 1px solid rgba(255,77,109,0.3);
    color: var(--accent3);
    padding: 8px 14px;
    font-size: 12px;
  }
  .btn-sm { padding: 8px 16px; font-size: 13px; }
  .btn-success {
    background: linear-gradient(135deg, #00b248, #00e676);
    color: #000;
    box-shadow: 0 4px 16px rgba(0,230,118,0.3);
  }
  .btn-success:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,230,118,0.45);
  }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(124,77,255,0.05);
  }
  .upload-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .upload-icon { font-size: 48px; margin-bottom: 12px; display: block; }
  .upload-text { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .upload-sub { font-size: 13px; color: var(--text2); }

  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 20px;
  }
  @media(max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }

  .setting-item label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .select {
    width: 100%;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    outline: none;
    cursor: pointer;
  }
  .select:focus { border-color: var(--accent); }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label { font-size: 14px; font-weight: 500; }
  .toggle-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-slider::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text2);
    top: 2px; left: 2px;
    transition: all 0.2s;
  }
  .toggle input:checked + .toggle-slider {
    background: var(--accent);
    border-color: var(--accent);
  }
  .toggle input:checked + .toggle-slider::after {
    background: white;
    transform: translateX(20px);
  }

  .duration-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    padding: 8px 16px;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .pill.selected {
    background: rgba(124,77,255,0.2);
    border-color: var(--accent);
    color: var(--accent);
  }
  .pill:hover { border-color: var(--accent); }

  .progress-wrap { display: none; margin-top: 20px; }
  .progress-wrap.visible { display: block; }
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 8px;
  }
  .progress-label { font-weight: 600; color: var(--accent2); }
  .progress-pct { color: var(--text2); }
  .progress-bar {
    height: 8px;
    background: var(--bg3);
    border-radius: 100px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.5s ease;
    position: relative;
    min-width: 0;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0;
    height: 100%;
    width: 40px;
    background: rgba(255,255,255,0.3);
    filter: blur(6px);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { 0% { opacity:0; } 50% { opacity:1; } 100% { opacity:0; } }
  .progress-message { font-size: 13px; color: var(--text2); margin-top: 8px; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-queued     { background: rgba(136,136,170,0.15); color: var(--text2); }
  .status-downloading{ background: rgba(0,229,255,0.15);   color: var(--accent2); }
  .status-analyzing  { background: rgba(124,77,255,0.15);  color: var(--accent); }
  .status-scoring    { background: rgba(124,77,255,0.2);   color: #b39dff; }
  .status-clipping   { background: rgba(255,171,64,0.15);  color: var(--warn); }
  .status-done       { background: rgba(0,230,118,0.15);   color: var(--success); }
  .status-error      { background: rgba(255,77,109,0.15);  color: var(--accent3); }
  .status-cancelled  { background: rgba(136,136,170,0.1);  color: var(--text2); }

  /* ── Clips section ── */
  .clips-section { display: none; }
  .clips-section.visible { display: block; }

  .clips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }

  .clip-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .clip-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(124,77,255,0.2);
    border-color: rgba(124,77,255,0.3);
  }

  /* Video player wrapper with play overlay */
  .clip-player-wrap {
    position: relative;
    background: #000;
    cursor: pointer;
  }
  .clip-video {
    width: 100%;
    aspect-ratio: 9/16;
    background: #000;
    display: block;
    object-fit: cover;
  }
  .clip-video.horizontal { aspect-ratio: 16/9; }
  .clip-video.square     { aspect-ratio: 1/1; }

  /* Big play button overlay */
  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.45);
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .play-overlay.hidden { opacity: 0; }
  .play-btn-circle {
    width: 64px;
    height: 64px;
    background: rgba(124,77,255,0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 24px rgba(124,77,255,0.6);
    transition: transform 0.15s;
  }
  .clip-player-wrap:hover .play-btn-circle { transform: scale(1.12); }
  .play-icon {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 12px 0 12px 22px;
    border-color: transparent transparent transparent white;
    margin-left: 4px;
  }

  .clip-info { padding: 14px; }
  .clip-title {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .clip-score {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
  }
  .score-high { background: rgba(0,230,118,0.15);  color: var(--success); }
  .score-mid  { background: rgba(255,171,64,0.15);  color: var(--warn); }
  .score-low  { background: rgba(255,77,109,0.15);  color: var(--accent3); }

  .clip-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .clip-transcript {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .clip-actions { display: flex; gap: 8px; }

  /* Jobs history */
  .jobs-list { display: flex; flex-direction: column; gap: 12px; }
  .job-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .job-item:hover { border-color: rgba(124,77,255,0.3); }
  .job-thumb {
    width: 48px; height: 48px;
    border-radius: 10px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .job-info { flex: 1; min-width: 0; }
  .job-name {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .job-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }

  .sites-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .site-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }

  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--text2);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; display: block; }
  .empty-text { font-size: 15px; font-weight: 500; }
  .empty-sub { font-size: 13px; margin-top: 6px; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 340px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(0,230,118,0.3); }
  .toast.error   { border-color: rgba(255,77,109,0.3); }

  @media(max-width: 480px) {
    .header { padding: 32px 0 28px; }
    .logo-text { font-size: 28px; }
    .card { padding: 20px 16px; }
    .clips-grid { grid-template-columns: 1fr 1fr; }
    .url-input-wrap { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">✂️</div>
      <span class="logo-text">ClipAI</span>
    </div>
    <p class="tagline">Turn long videos into <span>viral short clips</span> — 100% local, no subscription</p>
    <div class="mode-badge">
      <span class="mode-dot" id="modeDot"></span>
      <span id="modeText">Checking...</span>
    </div>
  </div>

  <!-- Input Card -->
  <div class="card">
    <div class="card-title"><span class="icon">🎬</span> Add Your Video</div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('url')">🔗 Paste URL</button>
      <button class="tab" onclick="switchTab('upload')">📱 Upload File</button>
    </div>

    <!-- URL Panel -->
    <div class="tab-panel active" id="panel-url">
      <div class="url-input-wrap">
        <input type="url" id="urlInput" class="input"
          placeholder="Paste YouTube, TikTok, Instagram, X... link">
        <button class="btn btn-primary" onclick="fetchUrlInfo()" id="fetchBtn">Preview</button>
      </div>

      <div id="urlPreview" style="display:none; margin-bottom:16px;">
        <div style="background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:14px; display:flex; gap:12px; align-items:center;">
          <img id="previewThumb" src="" style="width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0;" onerror="this.style.display='none'">
          <div style="min-width:0">
            <div id="previewTitle" style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
            <div id="previewMeta" style="font-size:12px;color:var(--text2);margin-top:4px;"></div>
          </div>
        </div>
      </div>

      <div class="sites-grid">
        <span class="site-pill">YouTube</span>
        <span class="site-pill">TikTok</span>
        <span class="site-pill">Instagram</span>
        <span class="site-pill">Twitter/X</span>
        <span class="site-pill">Facebook</span>
        <span class="site-pill">Vimeo</span>
        <span class="site-pill">Twitch</span>
        <span class="site-pill">Reddit</span>
        <span class="site-pill">+1000 more</span>
      </div>
    </div>

    <!-- Upload Panel -->
    <div class="tab-panel" id="panel-upload">
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="video/mp4,video/quicktime,video/avi,video/webm,video/mkv,video/x-flv,video/3gpp,video/*"
          onchange="handleFileSelect(this)">
        <span class="upload-icon">📁</span>
        <div class="upload-text">Tap to select video</div>
        <div class="upload-sub">MP4, MOV, AVI, MKV, WEBM — up to 500MB</div>
        <div id="selectedFile" style="display:none; margin-top:12px; font-weight:600; color:var(--accent2);"></div>
      </div>
    </div>

    <!-- Settings -->
    <div style="margin-top:24px;">
      <div class="card-title" style="font-size:15px; margin-bottom:14px;"><span class="icon">⚙️</span> Clip S
